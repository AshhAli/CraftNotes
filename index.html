<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Sanctuary Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Your Study Sanctuary</h1>
    </header>
    <main>
        <section id="exam-countdown">
            <h2>Exam Countdown</h2>
            <p id="countdown-timer">00 days 00 hours 00 minutes 00 seconds</p>
        </section>
        <section id="session-logging">
            <h2>Session Logging</h2>
            <form id="session-form">
                <label for="session-title">Session Title:</label>
                <input type="text" id="session-title" required>
                <label for="session-duration">Duration (in minutes):</label>
                <input type="number" id="session-duration" required>
                <button type="submit">Log Session</button>
            </form>
            <ul id="session-list"></ul>
        </section>
        <section id="todo-list">
            <h2>Todo List</h2>
            <form id="todo-form">
                <input type="text" id="todo-input" placeholder="Add a new task" required>
                <button type="submit">Add</button>
            </form>
            <ul id="todo-list-items"></ul>
        </section>
        <section id="stats-dashboard">
            <h2>Stats Dashboard</h2>
            <p>Total Study Sessions: <span id="total-sessions">0</span></p>
            <p>Total Time Studied: <span id="total-time">0 minutes</span></p>
        </section>
        <section id="recent-sessions-feed">
            <h2>Recent Sessions</h2>
            <ul id="recent-sessions-list"></ul>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Study Sanctuary. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
